<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>

<body>
<a href="cuadro 1.html" target="_blank">Cuadro</a><br>
</a>
<div>

    <h1>Formulario Completo</h1>

    <form>

        Nombre:<br>
        <input type="text"><br><br>

        Apellido:<br>
        <input type="text"><br><br>

        Correo:<br>
        <input type="email"><br><br>

        Contraseña:<br>
        <input type="password"><br><br>

        Teléfono:<br>
        <input type="tel"><br><br>

        Dirección:<br>
        <input type="text"><br><br>

        País:<br>
        <select>
            <option>República Dominicana</option>
            <option>México</option>
            <option>España</option>
            <option>Argentina</option>
        </select><br><br>

        Curso:<br>
        <select>
            <option>Primaria</option>
            <option>Secundaria</option>
            <option>Bachillerato</option>
            <option>Universidad</option>
        </select><br><br>

        Sexo:<br>
        <input type="radio" name="sexo"> Masculino<br>
        <input type="radio" name="sexo"> Femenino<br><br>

        Hobbies:<br>
        <input type="checkbox"> Deporte<br>
        <input type="checkbox"> Música<br>
        <input type="checkbox"> Lectura<br><br>

        Comentarios:<br>
        <textarea rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Enviar">

        <br><br>

        

    </form>

</div>

</body>
</html>
