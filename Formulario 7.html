<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
<a href="Formulario 8.html" target="_blank">Formularios 8</a>
<div>

    <h2>Formulario de Registro</h2>

    <form>

        <label>Nombre:</label><br>
        <input type="text" name="nombre"><br><br>

        <label>Apellido:</label><br>
        <input type="text" name="apellido"><br><br>

        <label>Correo Electrónico:</label><br>
        <input type="email" name="correo"><br><br>

        <label>Contraseña:</label><br>
        <input type="password" name="password"><br><br>

        <label>Edad:</label><br>
        <input type="number" name="edad"><br><br>

        <label>Sexo:</label><br>
        <input type="radio" name="sexo" value="masculino"> Masculino<br>
        <input type="radio" name="sexo" value="femenino"> Femenino<br><br>

        <label>Hobbies:</label><br>
        <input type="checkbox" name="hobby" value="deporte"> Deporte<br>
        <input type="checkbox" name="hobby" value="musica"> Música<br>
        <input type="checkbox" name="hobby" value="lectura"> Lectura<br><br>

        <label>Ciudad:</label><br>
        <select name="ciudad">
            <option>Santo Domingo</option>
            <option>Santiago</option>
            <option>La Romana</option>
            <option>Punta Cana</option>
        </select><br><br>

        <label>Comentarios:</label><br>
        <textarea name="comentarios" rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Enviar">

    </form>

</div>

</body>
</html>
